<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>安家房产 - 专业房产中介</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  html{scroll-behavior:smooth}body{font-family:system-ui,-apple-system,sans-serif}
  .fade-up{opacity:0;transform:translateY(30px);animation:fadeInUp .6s cubic-bezier(.16,1,.3,1) forwards}
  @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
  .delay-1{animation-delay:.1s}.delay-2{animation-delay:.2s}.delay-3{animation-delay:.3s}
</style>
</head>
<body class="bg-white text-gray-800">

<nav class="fixed top-0 w-full z-50 bg-white/95 backdrop-blur border-b border-red-100">
  <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
    <a href="#" class="text-xl font-bold text-gray-900">安家<span class="text-red-500">房产</span></a>
    <div class="hidden md:flex gap-8 text-sm text-gray-500">
      <a href="#listings" class="hover:text-red-500">在售房源</a><a href="#about" class="hover:text-red-500">关于我们</a><a href="#contact" class="hover:text-red-500">联系</a>
    </div>
    <button class="bg-red-500 hover:bg-red-600 text-white px-5 py-2 rounded text-sm font-semibold cursor-pointer">预约看房</button>
  </div>
</nav>

<section class="pt-28 pb-20 px-6 bg-gradient-to-br from-red-50 to-orange-50 text-center">
  <div class="max-w-3xl mx-auto">
    <span class="inline-block bg-red-100 text-red-600 text-xs font-semibold px-3 py-1 rounded-full mb-6 fade-up">🏡 10年本地老店</span>
    <h1 class="text-4xl sm:text-5xl font-bold text-gray-900 mb-6 fade-up delay-1">找到属于你的<span class="text-red-500">理想之家</span></h1>

    <div class="flex flex-col sm:flex-row justify-center gap-4 fade-up delay-3">
      <button class="bg-red-500 text-white px-8 py-3.5 rounded font-semibold text-lg hover:bg-red-400 cursor-pointer">查看房源</button>
      <button class="border border-gray-300 text-gray-700 px-8 py-3.5 rounded font-semibold text-lg hover:border-red-300 cursor-pointer">免费估价</button>
    </div>
  </div>
</section>

<section id="listings" class="py-20 px-6 max-w-6xl mx-auto">
  <h2 class="text-3xl font-bold text-center mb-12">精选房源</h2>
  <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-6">
    <div class="border rounded-xl overflow-hidden hover:shadow-md transition-shadow">
      <div class="h-40 bg-gradient-to-br from-red-100 to-orange-100 flex items-center justify-center text-5xl">🏠</div>
      <div class="p-4"><h3 class="font-semibold mb-1">阳光花园 3室2厅</h3><p class="text-gray-500 text-sm mb-2">120㎡ · 12/18层 · 南向</p><p class="text-red-500 font-bold text-lg">¥328万</p></div>
    </div>
    <div class="border rounded-xl overflow-hidden hover:shadow-md transition-shadow">
      <div class="h-40 bg-gradient-to-br from-blue-100 to-cyan-100 flex items-center justify-center text-5xl">🏢</div>
      <div class="p-4"><h3 class="font-semibold mb-1">滨江壹号 2室1厅</h3><p class="text-gray-500 text-sm mb-2">89㎡ · 25/32层 · 江景</p><p class="text-red-500 font-bold text-lg">¥256万</p></div>
    </div>
    <div class="border rounded-xl overflow-hidden hover:shadow-md transition-shadow">
      <div class="h-40 bg-gradient-to-br from-green-100 to-emerald-100 flex items-center justify-center text-5xl">🏘️</div>
      <div class="p-4"><h3 class="font-semibold mb-1">翠苑新村 4室2厅</h3><p class="text-gray-500 text-sm mb-2">145㎡ · 6/6层 · 送阁楼</p><p class="text-red-500 font-bold text-lg">¥189万</p></div>
    </div>
  </div>
</section>

<section class="py-16 px-6 bg-gray-900 text-white text-center">
  <h2 class="text-3xl font-bold mb-4">卖房/买房？免费咨询</h2>
  <button class="bg-red-500 hover:bg-red-400 text-white px-10 py-4 rounded font-semibold text-lg cursor-pointer">联系经纪人 →</button>
</section>

<footer class="bg-gray-950 text-gray-400 py-8 px-6 text-center text-sm"><p>📍 杭州市西湖区文三路 66 号 | 📞 0571-8888-7777</p><p class="mt-2">© 2024 安家房产. All rights reserved.</p></footer>
